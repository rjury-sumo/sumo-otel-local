name: CI

on:
  pull_request:
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck and yamllint (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint

      - name: Install shellcheck and yamllint (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck yamllint

      - name: Install shfmt (pinned)
        shell: bash
        run: |
          # renovate: datasource=github-releases depName=mvdan/sh
          SHFMT_VERSION=v3.13.1
          # shfmt publishes no checksum file, so the per-asset SHA-256 digests are
          # pinned here and verified before the binary is placed on PATH. Renovate
          # bumps SHFMT_VERSION but CANNOT refresh these digests — update all four in
          # the same PR (until then the checksum check below fails closed).
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)    asset=linux_amd64;  sha=fb096c5d1ac6beabbdbaa2874d025badb03ee07929f0c9ff67563ce8c75398b1 ;;
            Linux-ARM64)  asset=linux_arm64;  sha=32d92acaa5cd8abb29fc49dac123dc412442d5713967819d8af2c29f1b3857c7 ;;
            macOS-ARM64)  asset=darwin_arm64; sha=9680526be4a66ea1ffe988ed08af58e1400fe1e4f4aef5bd88b20bb9b3da33f8 ;;
            macOS-X64)    asset=darwin_amd64; sha=6feedafc72915794163114f512348e2437d080d0047ef8b8fa2ec63b575f12af ;;
            *) echo "Unsupported runner: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          curl -fsSL -o /tmp/shfmt \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_${asset}"
          echo "${sha}  /tmp/shfmt" | shasum -a 256 -c -
          chmod +x /tmp/shfmt
          sudo mv /tmp/shfmt /usr/local/bin/shfmt

      - name: Tool versions
        run: |
          shellcheck --version
          shfmt --version
          yamllint --version

      - name: Bash syntax (bash -n)
        run: |
          for f in ./*.sh; do
            bash -n "$f"
          done

      - name: shellcheck
        run: shellcheck ./*.sh

      - name: shfmt (diff)
        run: shfmt -d -i 4 -ci ./*.sh

      - name: yamllint
        run: yamllint -c .yamllint.yml kind-config.yaml values.yaml examples/*.yaml manifests/*.yaml

  # Runs the bats-core unit/flow suite (tests/) on both OSes. The script is
  # sourceable without side effects (strict mode + traps live in main()), so the
  # tests exercise individual functions against stubbed external commands.
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install bats (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install bats (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core

      - name: Run bats suite
        run: bats --print-output-on-failure tests/

  # Validates a "mock" deployment with no live Sumo org: the upstream sumologic
  # chart is rendered against every values file with dummy credentials (mirroring
  # the flags sumo-otel-local.sh passes), the rendered manifests are schema-checked
  # with kubeconform, and finally a KinD cluster validates them server-side via
  # `helm install --dry-run=server` (CRDs are pre-applied so custom resources
  # validate). Docker-only — see TODO.md if the server dry-run proves flaky.
  mock-deploy:
    name: Mock deployment (helm render + KinD dry-run)
    runs-on: ubuntu-latest
    # Reviewed 2026-06-18: 4/4 green, ~85s (KinD create 39s / dry-run 18s). Kept the
    # server-side dry-run. The timeout bounds any future KinD hang to 15 min instead
    # of inheriting the 6-hour default; if the step ever regresses, fall back to
    # --dry-run=client or the cluster-free render+kubeconform gate (see TODO.md).
    timeout-minutes: 15
    env:
      SUMO_HELM_REPO_URL: https://sumologic.github.io/sumologic-kubernetes-collection
      CHART: sumologic/sumologic
      NS: sumologic
    steps:
      - uses: actions/checkout@v5

      # Single source of truth: source the script to reuse its pinned chart version and
      # the shared SUMO_COMMON_SET overrides, so CI validates exactly what users deploy
      # (no re-listed flags to drift). The common-set tokens contain no spaces, so a
      # space-joined string is safe to re-split into argv downstream.
      - name: Load chart config from the script
        run: |
          set --
          # shellcheck disable=SC1091
          source ./sumo-otel-local.sh; trap - ERR EXIT
          [[ -n "$SUMO_CHART_VERSION" ]] || { echo "Could not read SUMO_CHART_VERSION"; exit 1; }
          [[ "${#SUMO_COMMON_SET[@]}" -gt 0 ]] || { echo "Could not read SUMO_COMMON_SET"; exit 1; }
          echo "CHART_VERSION=$SUMO_CHART_VERSION" >> "$GITHUB_ENV"
          echo "COMMON_SET=${SUMO_COMMON_SET[*]}" >> "$GITHUB_ENV"
          echo "Chart $SUMO_CHART_VERSION; common overrides: ${SUMO_COMMON_SET[*]}"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install kubeconform
        run: |
          # renovate: datasource=github-releases depName=yannh/kubeconform
          KUBECONFORM_VERSION=v0.7.0
          base="https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}"
          curl -fsSL -o /tmp/kubeconform.tar.gz "${base}/kubeconform-linux-amd64.tar.gz"
          # Verify against the release's published CHECKSUMS before extracting (fetched
          # per-version, so a Renovate bump of KUBECONFORM_VERSION self-verifies).
          expected=$(curl -fsSL "${base}/CHECKSUMS" | awk '$2=="kubeconform-linux-amd64.tar.gz"{print $1}')
          echo "${expected}  /tmp/kubeconform.tar.gz" | sha256sum -c -
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Add sumologic Helm repo
        run: |
          helm repo add sumologic "$SUMO_HELM_REPO_URL" --force-update
          helm repo update sumologic

      - name: Write dummy credentials
        run: |
          umask 077
          cat > /tmp/ci-creds.yaml <<'EOF'
          sumologic:
            accessId: "ciDummyAccessId"
            accessKey: "ciDummyAccessKey"
          EOF

      # Mirrors the flags sumo-otel-local.sh's install_sumo() passes. Renders every
      # values file the repo ships and schema-checks the output. -ignore-missing-schemas
      # skips CRDs/custom resources kubeconform has no schema for (validated server-side later).
      - name: Render & schema-check all values files
        run: |
          # $COMMON_SET (the script's shared overrides) is intentionally unquoted so it
          # word-splits into argv; its tokens contain no spaces.
          common_flags=(
            --namespace "$NS" --create-namespace
            -f /tmp/ci-creds.yaml
            --set-string sumologic.clusterName=ci-test
            $COMMON_SET
          )
          fail=0
          for vf in values.yaml examples/*.yaml; do
            echo "::group::render $vf"
            if helm template sumologic "$CHART" --version "$CHART_VERSION" "${common_flags[@]}" -f "$vf" > "/tmp/rendered.yaml"; then
              docs=$(grep -c '^kind:' /tmp/rendered.yaml || true)
              if [[ "$docs" -lt 1 ]]; then
                echo "::error file=$vf::rendered 0 manifests"
                fail=1
              else
                echo "rendered $docs manifests"
                kubeconform -ignore-missing-schemas -summary /tmp/rendered.yaml || fail=1
              fi
            else
              echo "::error file=$vf::helm template failed"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"

      - name: Create KinD cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ci-mock

      # Pre-apply the chart's CRDs so the custom resources it renders
      # (OpenTelemetryCollector, ServiceMonitor, PrometheusRule, ...) validate
      # against the API server during the dry-run.
      - name: Pre-apply chart CRDs
        run: |
          # Extract ONLY the CustomResourceDefinition documents from --include-crds
          # output (applying the full render would create resources, defeating the
          # dry-run). --server-side avoids the "annotations too long" client-side
          # limit the large prometheus-operator CRDs hit.
          helm template sumologic "$CHART" --version "$CHART_VERSION" --namespace "$NS" --include-crds \
            -f /tmp/ci-creds.yaml --set-string sumologic.clusterName=ci-test \
            | awk '
                function flush() { if (isCRD && buf != "") printf "---\n%s", buf; buf=""; isCRD=0 }
                /^---[[:space:]]*$/ { flush(); next }
                { buf = buf $0 "\n"; if ($0 ~ /^kind: CustomResourceDefinition[[:space:]]*$/) isCRD=1 }
                END { flush() }
              ' \
            | kubectl apply --server-side -f -
          kubectl get crds

      - name: helm install --dry-run=server
        run: |
          # $COMMON_SET is unquoted on purpose so it word-splits into argv (no spaces).
          common_flags=(
            --namespace "$NS" --create-namespace
            -f /tmp/ci-creds.yaml
            --set-string sumologic.clusterName=ci-test
            $COMMON_SET
          )
          fail=0
          for vf in values.yaml examples/*.yaml; do
            echo "::group::dry-run $vf"
            if ! helm install sumologic "$CHART" --version "$CHART_VERSION" --dry-run=server "${common_flags[@]}" -f "$vf" >/dev/null; then
              echo "::error file=$vf::server-side dry-run failed"
              fail=1
            else
              echo "server-side dry-run OK"
            fi
            echo "::endgroup::"
          done
          exit "$fail"
