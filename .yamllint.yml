# yamllint configuration for sumo-otel-local
# Relaxed: catch real errors (syntax, duplicate keys, bad indentation) without
# failing on cosmetic preferences like line length.
extends: default

rules:
  line-length: disable
  document-start: disable
  comments:
    min-spaces-from-content: 1
  truthy:
    check-keys: false
  indentation:
    spaces: consistent
    indent-sequences: whatever
