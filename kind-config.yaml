# A sample multi-node cluster config file
# A three node (two workers, one controller) cluster config
# To add more worker nodes, add another role: worker to the list
#
# The cluster name is intentionally NOT set here. sumo-otel-local.sh is the single
# source of truth: it passes `--name "${CLUSTER_NAME}"` (default "sumo"), which is
# the same name uninstall/purge use to tear the cluster down.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
- role: worker
- role: worker
